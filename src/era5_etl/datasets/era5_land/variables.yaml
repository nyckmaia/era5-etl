# Available variables for the ERA5-LAND dataset.
# `defaults` lists the variables included in the "default download" preset.

defaults:
  - 2m_temperature
  - 2m_dewpoint_temperature
  - 10m_u_component_of_wind
  - 10m_v_component_of_wind
  - surface_pressure
  - total_precipitation

variables:
  - api_name: "2m_temperature"
    short_name: "t2m"
    friendly_name: "temperature_2m"
    full_name: "2-metre temperature"
    description: "Temperature of air at 2m above the land surface."
    unit: "K"

  - api_name: "2m_dewpoint_temperature"
    short_name: "d2m"
    friendly_name: "dewpoint_2m"
    full_name: "2-metre dewpoint temperature"
    description: "Temperature to which air at 2m above the land surface must be cooled to become saturated."
    unit: "K"

  - api_name: "10m_u_component_of_wind"
    short_name: "u10"
    friendly_name: "wind_u_10m"
    full_name: "10-metre U wind component"
    description: "Eastward component of the 10m wind over land. Combined with V to derive wind speed."
    unit: "m/s"

  - api_name: "10m_v_component_of_wind"
    short_name: "v10"
    friendly_name: "wind_v_10m"
    full_name: "10-metre V wind component"
    description: "Northward component of the 10m wind over land. Combined with U to derive wind speed."
    unit: "m/s"

  - api_name: "surface_pressure"
    short_name: "sp"
    friendly_name: "surface_pressure"
    full_name: "Surface pressure"
    description: "Atmospheric pressure on the land surface."
    unit: "Pa"

  - api_name: "total_precipitation"
    short_name: "tp"
    friendly_name: "total_precipitation"
    full_name: "Total precipitation"
    description: "Accumulated liquid and frozen water that falls to the land surface."
    unit: "m"

  - api_name: "soil_temperature_level_1"
    short_name: "stl1"
    friendly_name: "soil_temperature_level_1"
    full_name: "Soil temperature level 1"
    description: "Temperature of the soil in layer 1 (0-7 cm depth)."
    unit: "K"

  - api_name: "soil_temperature_level_2"
    short_name: "stl2"
    friendly_name: "soil_temperature_level_2"
    full_name: "Soil temperature level 2"
    description: "Temperature of the soil in layer 2 (7-28 cm depth)."
    unit: "K"

  - api_name: "soil_temperature_level_3"
    short_name: "stl3"
    friendly_name: "soil_temperature_level_3"
    full_name: "Soil temperature level 3"
    description: "Temperature of the soil in layer 3 (28-100 cm depth)."
    unit: "K"

  - api_name: "soil_temperature_level_4"
    short_name: "stl4"
    friendly_name: "soil_temperature_level_4"
    full_name: "Soil temperature level 4"
    description: "Temperature of the soil in layer 4 (100-289 cm depth)."
    unit: "K"

  - api_name: "volumetric_soil_water_layer_1"
    short_name: "swvl1"
    friendly_name: "volumetric_soil_water_layer_1"
    full_name: "Volumetric soil water layer 1"
    description: "Volume of water in soil layer 1 (0-7 cm) as a fraction of total volume."
    unit: "m3/m3"

  - api_name: "volumetric_soil_water_layer_2"
    short_name: "swvl2"
    friendly_name: "volumetric_soil_water_layer_2"
    full_name: "Volumetric soil water layer 2"
    description: "Volume of water in soil layer 2 (7-28 cm) as a fraction of total volume."
    unit: "m3/m3"

  - api_name: "volumetric_soil_water_layer_3"
    short_name: "swvl3"
    friendly_name: "volumetric_soil_water_layer_3"
    full_name: "Volumetric soil water layer 3"
    description: "Volume of water in soil layer 3 (28-100 cm) as a fraction of total volume."
    unit: "m3/m3"

  - api_name: "volumetric_soil_water_layer_4"
    short_name: "swvl4"
    friendly_name: "volumetric_soil_water_layer_4"
    full_name: "Volumetric soil water layer 4"
    description: "Volume of water in soil layer 4 (100-289 cm) as a fraction of total volume."
    unit: "m3/m3"

  - api_name: "skin_temperature"
    short_name: "skt"
    friendly_name: "skin_temperature"
    full_name: "Skin temperature"
    description: "Temperature of the land surface (skin temperature)."
    unit: "K"

  - api_name: "snow_depth"
    short_name: "sde"
    friendly_name: "snow_depth"
    full_name: "Snow depth"
    description: "Instantaneous grid-box average of the snow thickness on the ground (excluding snow on canopy)."
    unit: "m"

  # --- Evaporation components -----------------------------------------

  - api_name: "evaporation_from_bare_soil"
    short_name: "evabs"
    friendly_name: "evaporation_bare_soil"
    full_name: "Evaporation from bare soil"
    description: "Amount of evaporation from bare soil at the top of the land surface. Accumulated from the beginning of the forecast time to the end of the forecast step (water equivalent)."
    unit: "m"

  - api_name: "evaporation_from_open_water_surfaces_excluding_oceans"
    short_name: "evaow"
    friendly_name: "evaporation_open_water"
    full_name: "Evaporation from open water surfaces excluding oceans"
    description: "Amount of evaporation from surface water storage like lakes and inundated areas, excluding oceans. Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "evaporation_from_the_top_of_canopy"
    short_name: "evatc"
    friendly_name: "evaporation_canopy_top"
    full_name: "Evaporation from the top of canopy"
    description: "Amount of evaporation from the canopy interception reservoir at the top of the canopy. Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "evaporation_from_vegetation_transpiration"
    short_name: "evavt"
    friendly_name: "evaporation_vegetation_transpiration"
    full_name: "Evaporation from vegetation transpiration"
    description: "Amount of evaporation from vegetation transpiration (root extraction across soil layers). Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "potential_evaporation"
    short_name: "pev"
    friendly_name: "potential_evaporation"
    full_name: "Potential evaporation"
    description: "Potential evaporation under well-watered crops/mixed-farming assumptions; in ERA5-LAND computed as open-water (pan) evaporation. Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "total_evaporation"
    short_name: "e"
    friendly_name: "total_evaporation"
    full_name: "Total evaporation"
    description: "Accumulated water evaporated from the Earth's surface (including a simplified transpiration). Downward fluxes are positive; negative values indicate evaporation, positive condensation."
    unit: "m"

  # --- Albedo / radiation --------------------------------------------

  - api_name: "forecast_albedo"
    short_name: "fal"
    friendly_name: "forecast_albedo"
    full_name: "Forecast albedo"
    description: "Fraction of solar (shortwave) radiation reflected by Earth's surface, across the solar spectrum, for direct and diffuse radiation. Range 0-1."
    unit: "(0-1)"

  - api_name: "surface_solar_radiation_downwards"
    short_name: "ssrd"
    friendly_name: "surface_solar_radiation_downwards"
    full_name: "Surface solar radiation downwards"
    description: "Amount of solar (shortwave) radiation, direct + diffuse, reaching the surface. Accumulated; downward fluxes positive."
    unit: "J/m2"

  - api_name: "surface_thermal_radiation_downwards"
    short_name: "strd"
    friendly_name: "surface_thermal_radiation_downwards"
    full_name: "Surface thermal radiation downwards"
    description: "Amount of thermal (longwave) radiation emitted by the atmosphere/clouds that reaches the surface. Accumulated; downward fluxes positive."
    unit: "J/m2"

  - api_name: "surface_net_solar_radiation"
    short_name: "ssr"
    friendly_name: "surface_net_solar_radiation"
    full_name: "Surface net solar radiation"
    description: "Solar radiation reaching the surface (direct + diffuse) minus the portion reflected by the surface (governed by albedo). Accumulated; downward positive."
    unit: "J/m2"

  - api_name: "surface_net_thermal_radiation"
    short_name: "str"
    friendly_name: "surface_net_thermal_radiation"
    full_name: "Surface net thermal radiation"
    description: "Net thermal (longwave) radiation at the surface. Accumulated from the start of the forecast; downward fluxes positive."
    unit: "J/m2"

  - api_name: "surface_latent_heat_flux"
    short_name: "slhf"
    friendly_name: "surface_latent_heat_flux"
    full_name: "Surface latent heat flux"
    description: "Exchange of latent heat with the surface via turbulent diffusion. Accumulated; downward fluxes positive."
    unit: "J/m2"

  - api_name: "surface_sensible_heat_flux"
    short_name: "sshf"
    friendly_name: "surface_sensible_heat_flux"
    full_name: "Surface sensible heat flux"
    description: "Transfer of heat between surface and atmosphere via turbulent air motion (excluding condensation/evaporation). Accumulated; downward positive."
    unit: "J/m2"

  # --- Runoff / hydrology --------------------------------------------

  - api_name: "runoff"
    short_name: "ro"
    friendly_name: "runoff"
    full_name: "Runoff"
    description: "Total runoff (sum of surface and sub-surface) accumulated from the beginning of the forecast, expressed as a depth over the grid box."
    unit: "m"

  - api_name: "surface_runoff"
    short_name: "sro"
    friendly_name: "surface_runoff"
    full_name: "Surface runoff"
    description: "Water that drains over the surface (does not infiltrate the soil). Accumulated; depth over the grid box."
    unit: "m"

  - api_name: "sub_surface_runoff"
    short_name: "ssro"
    friendly_name: "sub_surface_runoff"
    full_name: "Sub-surface runoff"
    description: "Water draining underground (deep soil). Accumulated; depth over the grid box."
    unit: "m"

  - api_name: "skin_reservoir_content"
    short_name: "src"
    friendly_name: "skin_reservoir_content"
    full_name: "Skin reservoir content"
    description: "Water held in the vegetation canopy and a thin soil-surface layer (rain interception + dew). Water equivalent."
    unit: "m"

  # --- Lake variables ------------------------------------------------

  - api_name: "lake_bottom_temperature"
    short_name: "lblt"
    friendly_name: "lake_bottom_temperature"
    full_name: "Lake bottom temperature"
    description: "Temperature of water at the bottom of inland water bodies and coastal waters."
    unit: "K"

  - api_name: "lake_ice_depth"
    short_name: "licd"
    friendly_name: "lake_ice_depth"
    full_name: "Lake ice depth"
    description: "Thickness of the single modelled ice layer on inland water bodies and coastal waters."
    unit: "m"

  - api_name: "lake_ice_temperature"
    short_name: "lict"
    friendly_name: "lake_ice_temperature"
    full_name: "Lake ice temperature"
    description: "Temperature of the uppermost surface of ice on inland water bodies and coastal waters."
    unit: "K"

  - api_name: "lake_mix_layer_depth"
    short_name: "lmld"
    friendly_name: "lake_mix_layer_depth"
    full_name: "Lake mix-layer depth"
    description: "Thickness of the upper well-mixed layer of an inland water body (uniform temperature with depth)."
    unit: "m"

  - api_name: "lake_mix_layer_temperature"
    short_name: "lmlt"
    friendly_name: "lake_mix_layer_temperature"
    full_name: "Lake mix-layer temperature"
    description: "Temperature of the well-mixed upper layer of inland water bodies and coastal waters."
    unit: "K"

  - api_name: "lake_shape_factor"
    short_name: "lshf"
    friendly_name: "lake_shape_factor"
    full_name: "Lake shape factor"
    description: "Describes how temperature changes with depth in the thermocline layer; dimensionless."
    unit: "(0-1)"

  - api_name: "lake_total_layer_temperature"
    short_name: "ltlt"
    friendly_name: "lake_total_layer_temperature"
    full_name: "Lake total layer temperature"
    description: "Mean temperature of the entire water column (mean over the mixed layer and the thermocline)."
    unit: "K"

  # --- Vegetation ----------------------------------------------------

  - api_name: "leaf_area_index_high_vegetation"
    short_name: "lai_hv"
    friendly_name: "leaf_area_index_high_vegetation"
    full_name: "Leaf area index, high vegetation"
    description: "One-half of the total green leaf area per unit horizontal ground surface area for high vegetation."
    unit: "m2/m2"

  - api_name: "leaf_area_index_low_vegetation"
    short_name: "lai_lv"
    friendly_name: "leaf_area_index_low_vegetation"
    full_name: "Leaf area index, low vegetation"
    description: "One-half of the total green leaf area per unit horizontal ground surface area for low vegetation."
    unit: "m2/m2"

  # --- Snow ----------------------------------------------------------

  - api_name: "snow_albedo"
    short_name: "asn"
    friendly_name: "snow_albedo"
    full_name: "Snow albedo"
    description: "Fraction of solar radiation reflected by the snow (0-1). Typically 0.8 or higher for fresh snow."
    unit: "(0-1)"

  - api_name: "snow_cover"
    short_name: "snowc"
    friendly_name: "snow_cover"
    full_name: "Snow cover"
    description: "Fraction (0-1) of the grid box occupied by snow."
    unit: "%"

  - api_name: "snow_density"
    short_name: "rsn"
    friendly_name: "snow_density"
    full_name: "Snow density"
    description: "Mass of snow per cubic metre in the snow layer."
    unit: "kg/m3"

  - api_name: "snow_depth_water_equivalent"
    short_name: "sd"
    friendly_name: "snow_depth_water_equivalent"
    full_name: "Snow depth water equivalent"
    description: "Depth the water would have if the snow over the snow-covered area melted and was spread evenly over the grid box."
    unit: "m"

  - api_name: "snow_evaporation"
    short_name: "es"
    friendly_name: "snow_evaporation"
    full_name: "Snow evaporation"
    description: "Evaporation from snow averaged over the grid box. Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "snowfall"
    short_name: "sf"
    friendly_name: "snowfall"
    full_name: "Snowfall"
    description: "Accumulated total snow that has fallen to the surface (large-scale + convective). Water-equivalent depth over the grid box."
    unit: "m"

  - api_name: "snowmelt"
    short_name: "smlt"
    friendly_name: "snowmelt"
    full_name: "Snowmelt"
    description: "Melting of snow averaged over the grid box. Accumulated from the start of the forecast (water equivalent)."
    unit: "m"

  - api_name: "temperature_of_snow_layer"
    short_name: "tsn"
    friendly_name: "temperature_of_snow_layer"
    full_name: "Temperature of snow layer"
    description: "Temperature of the snow layer from the ground to the snow-air interface (single-layer model)."
    unit: "K"
