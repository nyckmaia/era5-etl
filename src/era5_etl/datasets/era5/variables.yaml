# Available variables for the ERA5 single-level dataset.
# Mirrors the grouping used by the CDS web form so the Download Wizard
# can present them in the same sections. Each variable may appear in
# multiple groups (e.g. "Popular" is a curated cross-cut of others).

defaults:
  - 2m_temperature
  - 2m_dewpoint_temperature
  - 10m_u_component_of_wind
  - 10m_v_component_of_wind
  - surface_pressure
  - total_precipitation

# Display order matches the CDS site. ``id`` is the stable token used by
# the API and the UI; ``label`` is the human title shown in the wizard.
groups:
  - id: popular
    label: Popular
  - id: temperature_pressure
    label: Temperature and pressure
  - id: wind
    label: Wind
  - id: mean_rates
    label: Mean rates
  - id: radiation_heat
    label: Radiation and heat
  - id: clouds
    label: Clouds
  - id: lakes
    label: Lakes
  - id: evaporation_runoff
    label: Evaporation and runoff
  - id: precipitation_rain
    label: Precipitation and rain
  - id: snow
    label: Snow
  - id: soil
    label: Soil
  - id: vertical_integrals
    label: Vertical integrals
  - id: vegetation
    label: Vegetation
  - id: ocean_waves
    label: Ocean waves
  - id: other
    label: Other

variables:

  # ----- Popular + Temperature/Pressure + Wind cross-cut ---------------

  - api_name: "2m_temperature"
    short_name: "t2m"
    friendly_name: "temperature_2m"
    full_name: "2-metre temperature"
    description: "Air temperature at 2 m above the surface; interpolated between the lowest model level and the surface."
    unit: "K"
    groups: [popular, temperature_pressure]

  - api_name: "2m_dewpoint_temperature"
    short_name: "d2m"
    friendly_name: "dewpoint_2m"
    full_name: "2-metre dewpoint temperature"
    description: "Temperature to which 2 m air would have to be cooled at constant pressure to reach saturation."
    unit: "K"
    groups: [popular, temperature_pressure]

  - api_name: "10m_u_component_of_wind"
    short_name: "u10"
    friendly_name: "wind_u_10m"
    full_name: "10-metre U wind component"
    description: "Eastward component of the 10 m wind; pairs with V to derive speed/direction."
    unit: "m/s"
    groups: [popular, wind]

  - api_name: "10m_v_component_of_wind"
    short_name: "v10"
    friendly_name: "wind_v_10m"
    full_name: "10-metre V wind component"
    description: "Northward component of the 10 m wind; pairs with U to derive speed/direction."
    unit: "m/s"
    groups: [popular, wind]

  - api_name: "mean_sea_level_pressure"
    short_name: "msl"
    friendly_name: "mean_sea_level_pressure"
    full_name: "Mean sea level pressure"
    description: "Surface pressure adjusted to mean sea level; used to identify synoptic systems over varied terrain."
    unit: "Pa"
    groups: [popular, temperature_pressure]

  - api_name: "mean_wave_direction"
    short_name: "mwd"
    friendly_name: "mean_wave_direction"
    full_name: "Mean wave direction"
    description: "Mean direction of ocean/wave-spectrum waves."
    unit: "degree"
    groups: [popular, ocean_waves]

  - api_name: "mean_wave_period"
    short_name: "mwp"
    friendly_name: "mean_wave_period"
    full_name: "Mean wave period"
    description: "Mean period of ocean waves (energy-weighted)."
    unit: "s"
    groups: [popular, ocean_waves]

  - api_name: "sea_surface_temperature"
    short_name: "sst"
    friendly_name: "sea_surface_temperature"
    full_name: "Sea surface temperature"
    description: "Temperature of the sea surface (analysed/forecast)."
    unit: "K"
    groups: [popular, temperature_pressure]

  - api_name: "significant_height_of_combined_wind_waves_and_swell"
    short_name: "swh"
    friendly_name: "significant_wave_height"
    full_name: "Significant height of combined wind waves and swell"
